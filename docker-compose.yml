version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
    volumes:
      # Persist uploaded files across container restarts
      - uploads_data:/app/server/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/auth"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  uploads_data:
