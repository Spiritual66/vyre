name: Deploy frontend to GitHub Pages

# Publishes the React client (static files) to GitHub Pages.
# NOTE: Pages can only host the frontend. The app needs the backend hosted
# elsewhere (e.g. Render). Set these in the repo (Settings → Secrets and
# variables → Actions → Variables):
#   VITE_API_URL   – full backend API URL, e.g. https://vyre-api.onrender.com/api
#   CUSTOM_DOMAIN  – (optional) e.g. yourdomain.com; when set, a CNAME is written
#                    and the base path is '/', otherwise it's '/vyre/'.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_BASE: ${{ vars.CUSTOM_DOMAIN != '' && '/' || '/vyre/' }}
        run: npm run build

      - name: SPA fallback + custom domain
        working-directory: client
        run: |
          cp dist/index.html dist/404.html
          if [ -n "${{ vars.CUSTOM_DOMAIN }}" ]; then
            echo "${{ vars.CUSTOM_DOMAIN }}" > dist/CNAME
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
